rules:
  - id: valid.metavariable.exception
    message: metavariable-pattern context allows no positive term
    languages: [rust]
    severity: ERROR
    match:
      pattern: $F($X)
      where:
        - metavariable:
            metavariable: $F
            all:
              - not:
                  pattern: foo
              - inside:
                  pattern: bar
