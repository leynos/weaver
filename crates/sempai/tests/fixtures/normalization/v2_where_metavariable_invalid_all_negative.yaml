rules:
  - id: v2.where.metavariable.invalid.all.negative
    message: metavariable pattern with all-negative conjunction should fail
    languages: [rust]
    severity: ERROR
    match:
      pattern: fn $FUNC($X)
      where:
        - metavariable:
            metavariable: $X
            all:
              - not:
                  pattern: "self"
              - inside:
                  pattern: "impl $T"
