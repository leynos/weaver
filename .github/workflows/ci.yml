name: CI

'on':
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      WHITAKER_INSTALLER_REV: 764d5a3199fa2999ae979255e467c9d96fd65780
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@18bed1ca49a6de3d8882bd72635a32ae3f023d57
      - name: Format
        run: make check-fmt
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@992badcdf24e3b8eb7e87ff9287fe931bcb00c6e  # v20
        with:
          globs: |
            **/*.md
            !**/target/**
            !**/dist/**
      - name: Install uv
        uses: astral-sh/setup-uv@4cda7d73322c50eac316ad623a716f09a2db2ac7
        # v3.1.2
        with:
          python-version: '3.11'
      - name: Spelling (en-GB-oxendict)
        run: make typos
      - name: Install bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76  # v2
        with:
          bun-version: '1.2.21'
      - name: Install Mermaid CLI
        run: |
          set -euxo pipefail
          bun install --no-progress --global @mermaid-js/mermaid-cli@11.9.0
          bun x @puppeteer/browsers browsers install chrome-headless-shell
          mmdc --version
      - name: Install Nixie
        run: uv tool install nixie-cli==1.1.0
      - name: Install Merman CLI
        run: cargo install merman-cli --version '=0.7.0' --locked
      - name: Mermaid lint
        run: make nixie
      - name: Boundary manifest gate
        run: cargo test -p weaver-docs-gate --test boundary_manifest -- --nocapture
      - name: Install Whitaker
        run: |
          cargo install --locked \
            --git https://github.com/leynos/whitaker \
            --rev "${WHITAKER_INSTALLER_REV}" \
            whitaker-installer
          # Test Whitaker's cranelift support from the pinned fix revision
          # instead of installing rustc-codegen-cranelift separately here.
          whitaker-installer --cranelift
      - name: Lint
        run: make lint
      - name: Workflow contract tests
        run: make test-workflow-contracts
      - name: Test and Measure Coverage
        uses: leynos/shared-actions/.github/actions/generate-coverage@18bed1ca49a6de3d8882bd72635a32ae3f023d57
        with:
          output-path: lcov.info
          format: lcov
          with-ratchet: 'true'
      - name: Check coverage against CodeScene gates
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: env.CS_ACCESS_TOKEN != '' && github.event_name == 'pull_request'
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@e0d9b652b137eb15314fff188f09e1ba18d3cc5b
        with:
          format: lcov
          mode: check
          project-url: https://api.codescene.io/v2/projects/71837
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}
